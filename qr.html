<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060d12" />
  <title>QR — Farmacias Aragón Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg:     #060d12;
      --card:   #0d1a22;
      --border: rgba(255,255,255,0.08);
      --text:   #ffffff;
      --sub:    #8faab8;
      --accent: #00C4A7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 20px;
    }

    /* ── Cartel digital (pantalla) ─────────── */
    .display-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .display-card::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,196,167,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .display-card::after {
      content: '';
      position: absolute;
      bottom: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,196,167,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .brand-icon { font-size: 32px; }
    .brand-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .headline {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .headline span { color: var(--accent); }

    .subline {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* QR box */
    .qr-box {
      background: #ffffff;
      border-radius: 20px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }
    #qrcode img, #qrcode canvas {
      display: block;
      border-radius: 8px;
    }

    .scan-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .scan-arrow { font-size: 18px; animation: bounce 1.4s ease-in-out infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    /* Benefits strip */
    .benefits {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .benefit {
      background: rgba(0,196,167,0.08);
      border: 1px solid rgba(0,196,167,0.15);
      border-radius: 14px;
      padding: 12px 8px;
    }
    .benefit .b-icon { font-size: 20px; margin-bottom: 6px; }
    .benefit .b-text { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.3; }

    .url-label {
      font-size: 11px;
      color: var(--sub);
      word-break: break-all;
      opacity: 0.7;
    }

    /* ── Botones ──────────────────────────── */
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 22px;
      cursor: pointer;
      transition: opacity 0.15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--accent); color: #060d12; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid var(--border); }

    /* ── Print styles ──────────────────────── */
    @media print {
      body {
        background: #ffffff !important;
        color: #000000 !important;
        padding: 0;
        justify-content: flex-start;
      }
      .btn-row { display: none !important; }
      .display-card {
        background: #ffffff !important;
        border: none !important;
        border-radius: 0 !important;
        padding: 40px !important;
        max-width: 100% !important;
        box-shadow: none !important;
      }
      .display-card::before, .display-card::after { display: none !important; }
      .brand-name { color: #000 !important; }
      .headline   { color: #000 !important; }
      .headline span { color: #007A6B !important; }
      .subline    { color: #555 !important; }
      .scan-label { color: #555 !important; }
      .benefit    { background: #f5f5f5 !important; border-color: #ddd !important; }
      .benefit .b-text { color: #000 !important; }
      .url-label  { color: #888 !important; }
      .qr-box { border: 2px solid #eee !important; }
    }
  </style>
</head>
<body>

<div class="display-card">

  <!-- Brand -->
  <div class="brand">
    <span class="brand-icon">⚕️</span>
    <span class="brand-name">Farmacias Aragón</span>
  </div>

  <!-- Headline -->
  <div class="headline">
    Únete a nuestro<br>
    <span>programa de puntos</span>
  </div>
  <div class="subline">
    Escanea el código con tu celular,<br>
    regístrate y empieza a acumular sellos hoy.
  </div>

  <!-- QR -->
  <div class="scan-arrow" style="font-size:22px;margin-bottom:10px;">👇</div>
  <div class="qr-box">
    <div id="qrcode"></div>
  </div>
  <div class="scan-label">
    <span class="scan-arrow">📱</span>
    Escanea con la cámara de tu celular
  </div>

  <!-- Benefits -->
  <div class="benefits">
    <div class="benefit">
      <div class="b-icon">💊</div>
      <div class="b-text">Sello por cada compra</div>
    </div>
    <div class="benefit">
      <div class="b-icon">🎁</div>
      <div class="b-text">Premio cada 10 sellos</div>
    </div>
    <div class="benefit">
      <div class="b-icon">⭐</div>
      <div class="b-text">Niveles exclusivos</div>
    </div>
  </div>

  <div class="url-label">faramaciasaragon.netlify.app/registro.html</div>

</div>

<!-- Botones de acción (no se imprimen) -->
<div class="btn-row">
  <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir cartel</button>
  <button class="btn btn-secondary" onclick="descargarQR()">⬇️ Descargar QR</button>
</div>

<script>
  // Generar QR
  const qr = new QRCode(document.getElementById('qrcode'), {
    text:           'https://faramaciasaragon.netlify.app/registro.html',
    width:          220,
    height:         220,
    colorDark:      '#000000',
    colorLight:     '#ffffff',
    correctLevel:   QRCode.CorrectLevel.H,
  });

  // Descargar QR como imagen PNG
  function descargarQR() {
    setTimeout(() => {
      const canvas = document.querySelector('#qrcode canvas');
      if (!canvas) {
        alert('El QR aún está generándose, intenta en un segundo.');
        return;
      }
      const link = document.createElement('a');
      link.download = 'qr-farmacias-aragon.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }, 200);
  }
</script>
</body>
</html>
